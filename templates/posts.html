<!DOCTYPE html>
<html>
<head>
    <title>{{ .title }}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>{{ .title }}</h1>

    {{ if .posts }}
    <table>
        <thead>
            <tr>
                <th>번호</th>
                <th>제목</th>
                <th>작성자</th>
                <th>작성일</th>
            </tr>
        </thead>
        <tbody>
            {{ range .posts }}
            <tr>
                <td>{{ .ID }}</td>
                <td><a href="/posts/{{ .ID }}">{{ .Title }}</a></td>
                <td>{{ .Author }}</td>
                <td>{{ formatDate .CreatedAt }}</td>
            </tr>
            {{ end }}
        </tbody>
    </table>
    {{ else }}
    <p>게시글이 없습니다.</p>
    {{ end }}
</body>
</html>
